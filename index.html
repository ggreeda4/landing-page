<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تعلم الذكاء الاصطناعي</title>

<meta name="description" content="اكتشف أفضل أدوات الذكاء الاصطناعي وابدأ بناء دخلك عبر الإنترنت">

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:30px;
background:#020617;
}

h1{
font-size:40px;
color:#22c55e;
}

.hero{
padding:80px 20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

button{
background:#22c55e;
border:none;
padding:15px 35px;
border-radius:8px;
font-size:18px;
color:white;
cursor:pointer;
}

.features{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:50px;
}

.box{
background:#1e293b;
padding:25px;
border-radius:10px;
width:250px;
}

.box h3{
color:#22c55e;
}

.email{
margin-top:40px;
}

input{
padding:12px;
width:250px;
border:none;
border-radius:6px;
margin-right:10px;
}

footer{
margin-top:60px;
padding:20px;
background:#020617;
}

</style>

</head>

<body>

<header>

<h1>AMB Tech 🚀</h1>

</header>

<section class="hero">

<h2>ابدأ تعلم أدوات الذكاء الاصطناعي</h2>

<p>
اكتشف الأدوات التي يستخدمها المحترفون لبناء دخل عبر الإنترنت
</p>

<button>ابدأ الآن</button>

</section>

<section class="features">

<div class="box">
<h3>أدوات AI</h3>
<p>أفضل أدوات الذكاء الاصطناعي المجربة</p>
</div>

<div class="box">
<h3>تعلم سريع</h3>
<p>دروس مختصرة وسهلة للمبتدئين</p>
</div>

<div class="box">
<h3>دخل أونلاين</h3>
<p>طرق حقيقية لبناء دخل عبر الإنترنت</p>
</div>

</section>

<section class="email">

<h2>احصل على الأدوات مجاناً</h2>

<input type="email" placeholder="اكتب بريدك الإلكتروني">

<button>اشترك</button>

</section>

<footer>

<p>© 2026 AMB Tech</p>

</footer>

</body>

</html>
